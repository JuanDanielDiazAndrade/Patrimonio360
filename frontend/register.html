<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<!-- Tailwind CSS con plugins de formularios y container queries para estilos utilitarios -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Fuente principal del proyecto -->
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Iconos de Material Symbols (dos variantes: peso y fill para distintos estilos de icono) -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

<script id="tailwind-config">
    /* Configuración personalizada de Tailwind:
       - darkMode por clase (se activa añadiendo 'dark' al <html>)
       - Colores de marca: primary (negro), fondos claro y oscuro
       - Fuente display y radios de borde redondeados uniformes */
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#000000",
                    "background-light": "#f8f6f6",
                    "background-dark": "#221610",
                },
                fontFamily: {
                    "display": ["Public Sans"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
        },
    }
</script>
<title>Patrimonio360° - Registrarse</title>
<link rel="icon" href="images/logo.jpg" type="image/png">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
        <div class="flex flex-1 justify-center items-center py-10 px-4 md:px-10">

            <!-- Contenedor principal: en móvil es columna, en escritorio es fila de dos paneles -->
            <div class="layout-content-container flex flex-col max-w-[1200px] w-full bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-hidden md:flex-row min-h-[700px]">

                <!-- ===== PANEL IZQUIERDO: imagen decorativa (solo visible en escritorio) ===== -->
                <div class="relative hidden md:flex md:w-1/2 bg-black overflow-hidden">

                    <!-- Imagen de fondo con degradado oscuro encima para mejorar legibilidad del texto -->
                    <div class="absolute inset-0 bg-cover bg-center"
                         data-alt="Calles coloniales de Cartagena"
                         style="background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.8)), url('images/cartagena_street.jpg');">
                    </div>

                    <!-- Texto superpuesto sobre la imagen, anclado al fondo del panel -->
                    <div class="relative z-10 flex flex-col justify-end p-12 h-full w-full">
                        <h1 class="text-4xl font-bold text-white mb-4">Patrimonio360°</h1>
                        <p class="text-lg text-white/90 leading-relaxed">Únete a nuestra comunidad y ayúdanos a preservar el vibrante tapiz del patrimonio cultural e histórico de Colombia para las futuras generaciones.</p>

                        <!-- Indicador de "paginación" decorativo (puntos de carrusel visual) -->
                        <div class="mt-8 flex gap-2">
                            <div class="w-12 h-1 bg-white rounded-full"></div>
                            <div class="w-2 h-1 bg-white/40 rounded-full"></div>
                            <div class="w-2 h-1 bg-white/40 rounded-full"></div>
                        </div>
                    </div>
                </div>

                <!-- ===== PANEL DERECHO: formulario de registro ===== -->
                <div class="flex flex-col w-full md:w-1/2 p-8 lg:p-12 justify-center">
                    <div class="mb-8">
                        <h2 class="text-3xl font-bold tracking-tight mb-2">Crear Cuenta</h2>
                        <p class="text-slate-500 dark:text-slate-400">Comienza tu exploración de los tesoros de Colombia hoy mismo.</p>
                    </div>

                    <!-- novalidate desactiva la validación nativa del navegador;
                         toda la validación se maneja manualmente en el JS de abajo -->
                    <form id="registerForm" class="flex flex-col gap-5 w-full max-w-md" novalidate>

                        <!-- Campo: Nombre completo -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Nombre Completo</label>
                            <div class="relative">
                                <!-- Icono posicionado absolutamente dentro del input -->
                                <img src="images/user_icon.png" alt="Icono usuario" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                <!-- aria-describedby vincula el input con su mensaje de error para lectores de pantalla -->
                                <input id="name" name="name" type="text" placeholder="Juan Pérez" required
                                       class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all"
                                       aria-describedby="nameError">
                            </div>
                            <!-- Mensaje de error oculto por defecto; se muestra mediante JS al fallar la validación -->
                            <p id="nameError" class="text-red-500 text-xs mt-1 hidden" role="alert"></p>
                        </div>

                        <!-- Campo: Correo electrónico -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Correo Electrónico</label>
                            <div class="relative">
                                <img src="images/email_icon.png" alt="Icono email" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                <input id="email" name="email" type="email" placeholder="ejemplo@correo.com" required
                                       class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all"
                                       aria-describedby="emailError">
                            </div>
                            <p id="emailError" class="text-red-500 text-xs mt-1 hidden" role="alert"></p>
                        </div>

                        <!-- Campos de contraseña en grid de 2 columnas en pantallas pequeñas y mayores -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                            <!-- Campo: Contraseña -->
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Contraseña</label>
                                <div class="relative">
                                    <img src="images/password_icon.png" alt="Icono contraseña" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                    <input id="password" name="password" type="password" placeholder="••••••••" required
                                           class="w-full pl-12 pr-12 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all"
                                           aria-describedby="passwordError">
                                    <!-- Botón de ojo para alternar visibilidad de la contraseña -->
                                    <img src="images/open_eye_icon.png" id="togglePassword"
                                         class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 cursor-pointer opacity-60 hover:opacity-100"
                                         alt="Mostrar contraseña">
                                </div>
                                <p id="passwordError" class="text-red-500 text-xs mt-1 hidden" role="alert"></p>
                            </div>

                            <!-- Campo: Confirmar contraseña -->
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Confirmar Contraseña</label>
                                <div class="relative">
                                    <img src="images/confirm_password_icon.png" alt="Icono confirmar contraseña" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                    <input id="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" required
                                           class="w-full pl-12 pr-12 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all"
                                           aria-describedby="confirmPasswordError">
                                    <!-- Botón de ojo independiente para este campo -->
                                    <img src="images/open_eye_icon.png" id="toggleConfirmPassword"
                                         class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 cursor-pointer opacity-60 hover:opacity-100"
                                         alt="Mostrar contraseña">
                                </div>
                                <p id="confirmPasswordError" class="text-red-500 text-xs mt-1 hidden" role="alert"></p>
                            </div>
                        </div>

                        <!-- Campo: Aceptación de términos -->
                        <div class="flex flex-col gap-1.5">
                            <div class="flex items-start gap-3">
                                <input id="terms" name="terms" type="checkbox" required
                                       class="mt-1 rounded border-slate-300 dark:border-slate-600 text-black focus:ring-black h-4 w-4"
                                       aria-describedby="termsError">
                                <label for="terms" class="text-xs text-slate-500 dark:text-slate-400 leading-normal">
                                    Acepto los
                                    <a href="#" class="text-black font-semibold hover:underline">Términos de Servicio</a>
                                    y la
                                    <a href="#" class="text-black font-semibold hover:underline">Política de Privacidad</a>.
                                </label>
                            </div>
                            <p id="termsError" class="text-red-500 text-xs hidden" role="alert"></p>
                        </div>

                        <!-- Botón de envío del formulario -->
                        <button id="submitBtn" type="submit"
                                class="w-full bg-black hover:bg-gray-900 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-black/25 transition-all flex justify-center items-center gap-2">
                            Crear Cuenta
                        </button>
                    </form>

                    <div class="relative my-8"></div>

                    <!-- Enlace de redirección para usuarios que ya tienen cuenta -->
                    <div class="mt-10 text-center">
                        <p class="text-sm text-slate-500 dark:text-slate-400">¿Ya tienes una cuenta?
                            <a class="text-black font-semibold hover:underline ml-1" href="login.html">Inicia sesión aquí</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* IIFE (Immediately Invoked Function Expression): encierra todo el código en un
   ámbito privado para no contaminar el scope global con las variables del formulario */
(function() {

    /* ── Referencias a elementos del DOM ── */
    const form               = document.getElementById('registerForm');
    const nameInput          = document.getElementById('name');
    const emailInput         = document.getElementById('email');
    const passwordInput      = document.getElementById('password');
    const confirmInput       = document.getElementById('confirmPassword');
    const togglePassword     = document.getElementById("togglePassword");
    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
    const termsInput         = document.getElementById('terms');

    /* Párrafos donde se inyectan los mensajes de error de cada campo */
    const nameError     = document.getElementById('nameError');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const confirmError  = document.getElementById('confirmPasswordError');
    const termsError    = document.getElementById('termsError');

    /* ── Expresiones regulares de validación ──
       emailRegex: formato básico usuario@dominio.extensión
       passwordRegex: mínimo 8 caracteres, al menos 1 mayúscula,
                      1 dígito y 1 carácter especial */
    const emailRegex    = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=[\]{};':"\\|,.<>\/?]).{8,}$/;

    /* ── Helpers de UI para errores ──
       showError: marca el input en rojo y muestra el mensaje
       clearError: restaura el estilo normal y oculta el mensaje */
    function showError(inputEl, errorEl, message) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
        inputEl.classList.add('border-red-300', 'ring-1', 'ring-red-400');
        inputEl.setAttribute('aria-invalid', 'true'); // accesibilidad: avisa a lectores de pantalla
    }
    function clearError(inputEl, errorEl) {
        errorEl.textContent = '';
        errorEl.classList.add('hidden');
        inputEl.classList.remove('border-red-300', 'ring-1', 'ring-red-400');
        inputEl.removeAttribute('aria-invalid');
    }

    /* ── Funciones de validación individuales ──
       Cada una retorna true si el campo es válido, false si no.
       Esto permite que el submit sepa exactamente qué campo falló. */

    function validateName() {
        const v = nameInput.value.trim(); // trim() evita que espacios en blanco pasen como nombre válido
        if (!v) {
            showError(nameInput, nameError, 'El nombre es obligatorio.');
            return false;
        }
        clearError(nameInput, nameError);
        return true;
    }

    function validateEmail() {
        const v = emailInput.value.trim();
        if (!v) {
            showError(emailInput, emailError, 'El correo es obligatorio.');
            return false;
        }
        if (!emailRegex.test(v)) {
            showError(emailInput, emailError, 'Ingrese un correo válido (ej: usuario@dominio.com).');
            return false;
        }
        clearError(emailInput, emailError);
        return true;
    }

    function validatePassword() {
        const v = passwordInput.value;
        if (!v) {
            showError(passwordInput, passwordError, 'La contraseña es obligatoria.');
            return false;
        }
        if (!passwordRegex.test(v)) {
            showError(passwordInput, passwordError, 'Mínimo 8 caracteres, 1 mayúscula, 1 número y 1 carácter especial.');
            return false;
        }
        clearError(passwordInput, passwordError);
        return true;
    }

    function validateConfirm() {
        const v = confirmInput.value;
        if (!v) {
            showError(confirmInput, confirmError, 'Debes confirmar la contraseña.');
            return false;
        }
        /* Compara contra el valor actual de passwordInput para detectar
           si el usuario cambió la contraseña después de confirmarla */
        if (v !== passwordInput.value) {
            showError(confirmInput, confirmError, 'Las contraseñas no coinciden.');
            return false;
        }
        clearError(confirmInput, confirmError);
        return true;
    }

    function validateTerms() {
        if (!termsInput.checked) {
            termsError.textContent = 'Debes aceptar los términos.';
            termsError.classList.remove('hidden');
            return false;
        }
        termsError.textContent = '';
        termsError.classList.add('hidden');
        return true;
    }

    /* ── Validación en tiempo real (mientras el usuario escribe) ──
       Mejora la experiencia al dar retroalimentación inmediata sin esperar al envío */
    nameInput.addEventListener('input', validateName);
    emailInput.addEventListener('input', validateEmail);
    passwordInput.addEventListener('input', function() {
        validatePassword();
        /* Si el usuario ya había escrito algo en "confirmar", re-valida
           para reflejar si ahora las contraseñas coinciden o no */
        if (confirmInput.value.trim() !== '') validateConfirm();
    });
    confirmInput.addEventListener('input', validateConfirm);
    termsInput.addEventListener('change', validateTerms);

    /* ── Validación al enviar el formulario ──
       Se evalúan todos los campos; si alguno falla, se cancela el envío
       y el foco se mueve al primer campo inválido para guiar al usuario */
form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const isNameValid    = validateName();
    const isEmailValid   = validateEmail();
    const isPassValid    = validatePassword();
    const isConfirmValid = validateConfirm();
    const isTermsValid   = validateTerms();

    if (!isNameValid || !isEmailValid || !isPassValid || !isConfirmValid || !isTermsValid) {
        if (!isNameValid)         nameInput.focus();
        else if (!isEmailValid)   emailInput.focus();
        else if (!isPassValid)    passwordInput.focus();
        else if (!isConfirmValid) confirmInput.focus();
        else                      termsInput.focus();
        return;
    }

    const submitBtn = document.getElementById('submitBtn');
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creando cuenta...';

    try {
        const response = await fetch('http://localhost:3000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name:            nameInput.value.trim(),
                email:           emailInput.value.trim(),
                password:        passwordInput.value,
                confirmPassword: confirmInput.value,
            }),
        });

        const data = await response.json();

        if (!response.ok) {
            if (data.errors) {
                data.errors.forEach(err => {
                    if (err.field === 'email')    showError(emailInput,    emailError,    err.message);
                    if (err.field === 'name')     showError(nameInput,     nameError,     err.message);
                    if (err.field === 'password') showError(passwordInput, passwordError, err.message);
                });
            } else {
                alert(data.message || 'Ocurrió un error. Inténtalo de nuevo.');
            }
            return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'index.html';

    } catch (error) {
        console.error('Error de conexión:', error);
        alert('No se pudo conectar con el servidor. Verifica tu conexión.');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
    }
});

    /* ── Toggle de visibilidad de contraseña ──
       Alterna entre type="password" (oculto) y type="text" (visible)
       y cambia el ícono de ojo abierto/cerrado en consecuencia */
    togglePassword.addEventListener("click", function () {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            togglePassword.src = "images/closed_eye_icon.png";
        } else {
            passwordInput.type = "password";
            togglePassword.src = "images/open_eye_icon.png";
        }
    });

    /* Mismo comportamiento para el campo de confirmación de contraseña */
    toggleConfirmPassword.addEventListener("click", function () {
        if (confirmInput.type === "password") {
            confirmInput.type = "text";
            toggleConfirmPassword.src = "images/closed_eye_icon.png";
        } else {
            confirmInput.type = "password";
            toggleConfirmPassword.src = "images/open_eye_icon.png";
        }
    });

})();
</script>
</body>
</html>
