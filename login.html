<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#ec5b13",
                    "background-light": "#f8f6f6",
                    "background-dark": "#221610",
                },
                fontFamily: {
                    "display": ["Public Sans"]
                },
                borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
        },
    }
</script>
<title>Patrimonio360° - Iniciar Sesión</title>
<link rel="icon" href="images/logo.jpg" type="image/png">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
        <div class="flex flex-1 justify-center items-center py-10 px-4 md:px-10">
            <div class="layout-content-container flex flex-col max-w-[1200px] w-full bg-white dark:bg-slate-900 shadow-2xl rounded-xl overflow-hidden md:flex-row min-h-[700px]">
                <div class="relative hidden md:flex md:w-1/2 bg-black overflow-hidden">
                    <div class="absolute inset-0 bg-cover" data-alt="Torre Colpatria" style="background-position: center 35%; background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.8)), url('images/colpatria_tower.jpg');">
                    </div>
                    <div class="relative z-10 flex flex-col justify-end p-12 h-full w-full">
                        <h1 class="text-4xl font-bold text-white mb-4">Patrimonio360°</h1>
                        <p class="text-lg text-white/90 leading-relaxed">Continua contribuyendo en nuestra comunidad y ayúdanos a preservar el vibrante tapiz del patrimonio cultural e histórico de Colombia para las futuras generaciones.</p>
                        <div class="mt-8 flex gap-2">
                            <div class="w-12 h-1 bg-white rounded-full"></div>
                            <div class="w-2 h-1 bg-white/40 rounded-full"></div>
                            <div class="w-2 h-1 bg-white/40 rounded-full"></div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col w-full md:w-1/2 p-8 lg:p-12 justify-center">
                    <div class="mb-8">
                        <h2 class="text-3xl font-bold tracking-tight mb-2">Iniciar Sesión</h2>
                        <p class="text-slate-500 dark:text-slate-400">Continua tu exploración de los tesoros de Colombia.</p>
                    </div>
                    <form class="flex flex-col gap-5 w-full max-w-md">
                        <div class="flex flex-col gap-1.5">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Correo Electrónico</label>
                            <div class="relative">
                                <img src="images/email_icon.png" alt="Icono email" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                <input type="email" placeholder="ejemplo@correo.com" class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all">
                            </div>
                        </div>
                            <div class="flex flex-col gap-1.5">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Contraseña</label>
                                <div class="relative">
                                    <img src="images/password_icon.png" alt="Icono contraseña" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-60">
                                    <input type="password" placeholder="••••••••" class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-black focus:border-transparent outline-none transition-all">
                                </div>
                            </div>
                        <button type="submit" class="w-full bg-black hover:bg-gray-900 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-black/25 transition-all flex justify-center items-center gap-2">Iniciar Sesión</button>
                    </form>
                    <div class="relative my-8"></div>
                    <div class="mt-10 text-center">
                        <p class="text-sm text-slate-500 dark:text-slate-400">¿No tienes una cuenta? <a class="text-black font-semibold hover:underline ml-1" href="register.html">Registrate aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
